---
- name: Base configuration for all Slinky MVP nodes
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install base packages on Amazon Linux / RHEL family
      ansible.builtin.dnf:
        name:
          - git
          - curl
          - wget
          - vim
          - jq
          - tar
          - unzip
          - chrony
          - python3
          - python3-pip
          - firewalld
        state: present
        update_cache: true
      when: ansible_os_family == "RedHat"

    - name: Install base packages on Debian / Ubuntu family
      ansible.builtin.apt:
        name:
          - git
          - curl
          - wget
          - vim
          - jq
          - tar
          - unzip
          - chrony
          - python3
          - python3-pip
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Enable and start chrony
      ansible.builtin.service:
        name: "{{ 'chronyd' if ansible_os_family == 'RedHat' else 'chrony' }}"
        state: started
        enabled: true

    - name: Enable and start firewalld on RedHat family
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
      when: ansible_os_family == "RedHat"

    - name: Show node info
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"
          - "IP: {{ ansible_default_ipv4.address | default('N/A') }}"
