---
- name: Validate Kubernetes cluster from build node
  hosts: build
  become: false

  tasks:
    - name: Show cluster nodes
      ansible.builtin.command: kubectl get nodes -o wide
      register: nodes
      changed_when: false

    - name: Show all pods
      ansible.builtin.command: kubectl get pods -A -o wide
      register: pods
      changed_when: false

    - name: Show system components
      ansible.builtin.command: kubectl get componentstatuses
      register: components
      changed_when: false
      failed_when: false

    - name: Show cluster info
      ansible.builtin.command: kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Check CoreDNS
      ansible.builtin.command: kubectl get pods -n kube-system -l k8s-app=kube-dns
      register: coredns
      changed_when: false

    - name: Check Calico
      ansible.builtin.command: kubectl get pods -n kube-system -l k8s-app=calico-node
      register: calico
      changed_when: false

    - name: Create test namespace
      ansible.builtin.command: kubectl create namespace k8s-validation
      register: ns_create
      changed_when: "'created' in ns_create.stdout"
      failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr

    - name: Run nginx test pod
      ansible.builtin.command: kubectl run nginx-test --image=nginx:stable --namespace k8s-validation --restart=Never
      register: nginx_run
      changed_when: "'created' in nginx_run.stdout"
      failed_when: nginx_run.rc != 0 and 'AlreadyExists' not in nginx_run.stderr

    - name: Wait for nginx test pod
      ansible.builtin.command: kubectl wait --for=condition=Ready pod/nginx-test -n k8s-validation --timeout=180s
      changed_when: false

    - name: Test DNS from busybox
      ansible.builtin.command: >
        kubectl run dns-test
        --image=busybox:1.36
        --namespace k8s-validation
        --restart=Never
        --rm -i
        --command --
        nslookup kubernetes.default.svc.cluster.local
      changed_when: false

    - name: Cleanup validation namespace
      ansible.builtin.command: kubectl delete namespace k8s-validation --ignore-not-found=true
      changed_when: true

    - name: Print validation summary
      ansible.builtin.debug:
        msg:
          - "Kubernetes validation completed successfully."
          - "{{ cluster_info.stdout_lines }}"
          - "{{ nodes.stdout_lines }}"
