---
- name: Install cert-manager with Helm
  ansible.builtin.command: >
    /usr/local/bin/helm upgrade --install {{ cert_manager_release_name }}
    {{ cert_manager_chart_ref }}
    --namespace {{ cert_manager_namespace }}
    --create-namespace
    --set crds.enabled={{ cert_manager_install_crds | lower }}
  changed_when: true

- name: Wait for cert-manager pods
  ansible.builtin.command: >
    /usr/local/bin/kubectl wait --for=condition=Ready pod
    -l app.kubernetes.io/instance={{ cert_manager_release_name }}
    -n {{ cert_manager_namespace }}
    --timeout=180s
  changed_when: false

- name: Show cert-manager pods
  ansible.builtin.command: /usr/local/bin/kubectl get pods -n {{ cert_manager_namespace }}
  register: cert_manager_pods
  changed_when: false

- name: Display cert-manager pods
  ansible.builtin.debug:
    var: cert_manager_pods.stdout_lines
