---
- name: Add NFS Subdir External Provisioner Helm repo
  ansible.builtin.command: >
    /usr/local/bin/helm repo add {{ nfs_provisioner_repo_name }} {{ nfs_provisioner_repo_url }}
  register: nfs_repo_add
  changed_when: "'has been added' in nfs_repo_add.stdout or 'has been added' in nfs_repo_add.stderr"
  failed_when: nfs_repo_add.rc != 0 and 'already exists' not in nfs_repo_add.stderr

- name: Update Helm repositories
  ansible.builtin.command: /usr/local/bin/helm repo update
  changed_when: false

- name: Install NFS Subdir External Provisioner
  ansible.builtin.command: >
    /usr/local/bin/helm upgrade --install {{ nfs_provisioner_release_name }}
    {{ nfs_provisioner_repo_name }}/nfs-subdir-external-provisioner
    --namespace {{ nfs_storageclass_namespace }}
    --create-namespace
    --set nfs.server={{ nfs_server }}
    --set nfs.path={{ nfs_export_path }}
    --set storageClass.name={{ nfs_storageclass_name }}
    --set storageClass.defaultClass={{ nfs_storageclass_default }}
    --wait
    --timeout 10m
  changed_when: true

- name: Validate StorageClass
  ansible.builtin.command: /usr/local/bin/kubectl get storageclass
  register: storageclass_output
  changed_when: false

- name: Show StorageClass
  ansible.builtin.debug:
    var: storageclass_output.stdout_lines
