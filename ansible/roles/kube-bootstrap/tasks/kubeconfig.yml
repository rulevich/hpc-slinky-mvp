---
- name: Create .kube directory for rocky
  ansible.builtin.file:
    path: /home/rocky/.kube
    state: directory
    owner: rocky
    group: rocky
    mode: "0755"
  when: inventory_hostname in groups['k8s_control']

- name: Copy admin kubeconfig for rocky
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/rocky/.kube/config
    owner: rocky
    group: rocky
    mode: "0600"
    remote_src: true
  when: inventory_hostname in groups['k8s_control']
