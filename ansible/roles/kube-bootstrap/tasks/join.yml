---
- name: Create kubeadm join command on control plane
  ansible.builtin.command: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false
  when: inventory_hostname in groups['k8s_control']

- name: Check if worker already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf
  when: inventory_hostname in groups['k8s_workers']

- name: Join Kubernetes workers
  ansible.builtin.command: "{{ hostvars[groups['k8s_control'][0]]['kubeadm_join_command']['stdout'] }}"
  when:
    - inventory_hostname in groups['k8s_workers']
    - not kubelet_conf.stat.exists
    - hostvars[groups['k8s_control'][0]]['kubeadm_join_command'] is defined
    - hostvars[groups['k8s_control'][0]]['kubeadm_join_command']['stdout'] is defined
