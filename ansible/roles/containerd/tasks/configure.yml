---
- name: Load containerd kernel modules now
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ containerd_kernel_modules }}"

- name: Persist containerd kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/containerd.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for module in containerd_kernel_modules %}
      {{ module }}
      {% endfor %}

- name: Configure Kubernetes networking sysctl
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ containerd_sysctl | dict2items }}"

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Generate containerd config with CRI enabled
  ansible.builtin.shell: |
    containerd config default > /etc/containerd/config.toml
    sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
    sed -i 's/disabled_plugins = \["cri"\]/disabled_plugins = []/g' /etc/containerd/config.toml
  changed_when: true
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.service:
    name: "{{ containerd_service }}"
    enabled: true
    state: started
