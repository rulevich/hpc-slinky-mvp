---
- name: Load containerd kernel modules now
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ containerd_kernel_modules }}"
  tags:
    - containerd
    - configure

- name: Persist containerd kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/containerd.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for module in containerd_kernel_modules %}
      {{ module }}
      {% endfor %}
  tags:
    - containerd
    - configure

- name: Configure Kubernetes networking sysctl
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ containerd_sysctl | dict2items }}"
  tags:
    - containerd
    - configure

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - containerd
    - configure

- name: Generate default containerd config
  ansible.builtin.shell: |
    containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  tags:
    - containerd
    - configure

- name: Enable SystemdCgroup in containerd
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: Restart containerd
  tags:
    - containerd
    - configure

- name: Enable and start containerd
  ansible.builtin.service:
    name: "{{ containerd_service }}"
    enabled: true
    state: started
  tags:
    - containerd
    - configure
