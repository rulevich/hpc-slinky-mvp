---
base_timezone: UTC

base_install_packages: true

base_manage_firewall: true

base_manage_selinux: true

base_disable_swap: true

base_configure_hostname: true

base_configure_time: true

base_configure_sysctl: true

base_cleanup: true

base_packages:
  - bash-completion
  - bind-utils
  - chrony
  - curl
  - git
  - jq
  - lsof
  - net-tools
  - nfs-utils
  - python3
  - python3-pip
  - rsync
  - tar
  - tcpdump
  - tree
  - unzip
  - vim
  - wget

base_package_state: present

base_chrony_service: chronyd

base_ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org
  - 3.pool.ntp.org

base_chrony_server_enabled: false
base_chrony_allow_cidr: "172.31.0.0/16"
base_chrony_client_server: "build01"

base_sysctl:
  vm.swappiness: 1
  vm.max_map_count: 262144
  fs.inotify.max_user_instances: 8192
  fs.inotify.max_user_watches: 1048576
  fs.file-max: 2097152

base_firewall_service: firewalld

base_firewall_enabled: true

base_selinux_policy: targeted
base_selinux_state: permissive

base_sshd_config:
  PermitRootLogin: "no"
  PasswordAuthentication: "no"
  PubkeyAuthentication: "yes"
  ChallengeResponseAuthentication: "no"
  GSSAPIAuthentication: "yes"

base_cleanup_dnf_cache: true
